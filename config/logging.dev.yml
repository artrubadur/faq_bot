cached_limit: 5
repeat_limit: 2

handlers:
  - sink: "ext://sys.stdout"
    level: "WARNING"
    colorize: true
    format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> [<level>{level}</level>] <cyan>{name}</cyan>: {message} | Extra: {extra}"

  - sink: "log/app.jsonl"
    json: true 
    level: "CRITICAL"
    rotation: "1 MB"
    retention: 5

  - sink: telegram
    level: "WARNING"
    cooldown: 1


activation:
  - ["aiogram.event", "WARNING"]
  - ["aiogram.dispatcher", "WARNING"]